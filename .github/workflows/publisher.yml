name: Auto Publisher

on:
  schedule:
    # كل ساعة — للاستخدام الحقيقي
    # غيّر لـ */5 للاختبار كل 5 دقائق
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'نشر فوري بدون انتظار الوقت؟'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install "python-telegram-bot==13.15"

      - name: Show Time Info
        run: |
          echo "UTC Time: $(date -u)"
          echo "Egypt offset: +2 or +3 (auto-detected in code)"

      - name: Run Publisher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ADMIN_CHAT_ID:  ${{ secrets.ADMIN_CHAT_ID }}
          CHANNEL_ID:     ${{ secrets.CHANNEL_ID }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CHECK_DAYS:     "7"
          GRACE_DAYS:     "3"
          FORCE_PUBLISH:  ${{ github.event.inputs.force_publish || 'false' }}
        run: python system.py